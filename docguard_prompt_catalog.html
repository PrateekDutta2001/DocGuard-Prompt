<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DocGuard — Prompt Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="docguard_prompt_catalog.css" />
</head>
<body>

<div class="wrap">
  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo-block">
        <!-- <div class="logo-mark">DG</div> -->
        <div>
          <div class="brand-name">DocGuard</div>
          <div class="brand-sub">Prompt Catalog</div>
        </div>
      </div>
      <div class="header-stats">
        <div class="hstat"><div class="hstat-num">50</div><div class="hstat-lbl">Total Prompts</div></div>
        <div class="hstat"><div class="hstat-num">35</div><div class="hstat-lbl">LLM</div></div>
        <div class="hstat"><div class="hstat-num">6</div><div class="hstat-lbl">Vision</div></div>
        <div class="hstat"><div class="hstat-num">9</div><div class="hstat-lbl">Pipeline</div></div>
      </div>
    </div>
  </header>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search prompts…" oninput="render()" />
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-f="All"      onclick="setF('All')">All</button>
      <button class="filter-btn" data-f="Invoice"   onclick="setF('Invoice')">Invoice</button>
      <button class="filter-btn" data-f="Academic"  onclick="setF('Academic')">Academic</button>
      <button class="filter-btn" data-f="Identity"  onclick="setF('Identity')">Identity</button>
      <button class="filter-btn" data-f="Vision"    onclick="setF('Vision')">Vision</button>
      <button class="filter-btn" data-f="Pipeline"  onclick="setF('Pipeline')">Pipeline</button>
      <button class="filter-btn" data-f="General"   onclick="setF('General')">General</button>
    </div>
    <span class="result-count" id="rcount">50 prompts</span>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="footer-box">
    System Design curated by <strong>Prateek Dutta</strong> & <strong>Isha Sharma</strong>. DocGuard Forgery detection Tool Prompts
  </div>
  </footer>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeBg(event)">
  <div class="modal" id="modal">
    <div class="modal-accent" id="mAccent"></div>
    <div class="modal-body">
      <div class="modal-top">
        <div>
          <div class="modal-num" id="mNum"></div>
          <div class="modal-title" id="mTitle"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-tags" id="mTags"></div>
      <div class="section-label">Overview</div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="section-label">Returns</div>
      <div class="ret-box" id="mRet"></div>
      <div class="section-label">Prompt</div>
      <div class="prompt-box" id="mPrompt"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyP()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy prompt
      </button>
    </div>
  </div>
</div>

<script src="docguard_prompt_catalog.js"></script>
</body>
</html>
